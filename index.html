<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Trip Planner Pro</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        :root {
            --ink: #1a1a2e;
            --paper: #faf8f4;
            --accent: #c9773a;
            --accent-light: #f0e0cd;
            --muted: #8a8070;
            --border: #e8e2d9;
            --white: #ffffff;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
        }

        h1, h2, h3, .serif { font-family: 'Playfair Display', serif; }

        /* ---- TOAST ---- */
        #toast-container {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            z-index: 9999; display: flex; flex-direction: column; gap: 8px; align-items: center;
            pointer-events: none;
        }
        .toast {
            padding: 10px 20px; border-radius: 100px; font-size: 0.85rem; font-weight: 600;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15); pointer-events: auto;
            animation: toastIn 0.3s ease forwards;
            display: flex; align-items: center; gap: 8px;
        }
        .toast.success { background: #1a1a2e; color: #fff; }
        .toast.error   { background: #b91c1c; color: #fff; }
        .toast.info    { background: #c9773a; color: #fff; }
        .toast.warning { background: #92400e; color: #fff; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateY(10px); } }

        /* ---- OVERLAY / LANDING ---- */
        #ai-overlay {
            position: fixed; inset: 0;
            background: var(--paper);
            z-index: 100;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 24px;
            overflow-y: auto;
        }

        .overlay-bg {
            position: absolute; inset: 0; overflow: hidden; pointer-events: none;
        }
        .overlay-bg::before {
            content: '';
            position: absolute; top: -20%; right: -10%;
            width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(201,119,58,0.12) 0%, transparent 70%);
            border-radius: 50%;
        }
        .overlay-bg::after {
            content: '';
            position: absolute; bottom: -10%; left: -10%;
            width: 400px; height: 400px;
            background: radial-gradient(circle, rgba(26,26,46,0.06) 0%, transparent 70%);
            border-radius: 50%;
        }

        .landing-card {
            width: 100%; max-width: 520px;
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 24px;
            box-shadow: 0 8px 40px rgba(26,26,46,0.08);
            padding: 36px;
            position: relative; z-index: 1;
        }

        .field-label {
            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
            text-transform: uppercase; color: var(--muted); margin-bottom: 6px; display: block;
        }

        .field-input {
            width: 100%; border: 1.5px solid var(--border); border-radius: 12px;
            padding: 11px 14px; font-size: 0.9rem; font-family: 'DM Sans', sans-serif;
            color: var(--ink); background: var(--paper); transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .field-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(201,119,58,0.12); background: var(--white); }
        .field-input::placeholder { color: #b5aea3; }

        textarea.field-input { resize: none; }

        /* ---- MODEL SELECTOR ---- */
        .glass-panel {
            background: var(--paper); border: 1.5px solid var(--border);
            border-radius: 16px; margin-bottom: 16px; padding: 16px;
        }
        .model-chip-group { display: flex; flex-wrap: wrap; gap: 8px; }
        .model-chip {
            background: var(--white); border: 1.5px solid var(--border); border-radius: 8px;
            padding: 8px 12px; font-size: 0.75rem; font-weight: 700; color: var(--muted);
            cursor: pointer; transition: all 0.2s; font-family: 'DM Sans', sans-serif;
            flex-grow: 1; text-align: center;
        }
        .model-chip:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
        .model-chip.active { background: var(--ink); color: var(--white); border-color: var(--ink); }

        .btn-primary {
            width: 100%; background: var(--ink); color: var(--white);
            border: none; border-radius: 12px; padding: 13px;
            font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: background 0.2s, transform 0.1s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary:hover:not(:disabled) { background: #2d2d4e; }
        .btn-primary:active:not(:disabled) { transform: scale(0.98); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }

        .btn-secondary {
            background: var(--accent-light); color: var(--accent);
            border: none; border-radius: 12px; padding: 11px 20px;
            font-family: 'DM Sans', sans-serif; font-size: 0.9rem; font-weight: 600;
            cursor: pointer; transition: background 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px; white-space: nowrap;
        }
        .btn-secondary:hover:not(:disabled) { background: #e8d0b8; }
        .btn-secondary:disabled { opacity: 0.4; cursor: not-allowed; }

        .divider {
            display: flex; align-items: center; gap: 12px; margin: 24px 0;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: var(--border);
        }
        .divider span {
            font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em;
            text-transform: uppercase; color: var(--muted);
        }

        .select-input {
            flex: 1; border: 1.5px solid var(--border); border-radius: 12px;
            padding: 11px 14px; font-size: 0.9rem; font-family: 'DM Sans', sans-serif;
            color: var(--ink); background: var(--white); outline: none;
            transition: border-color 0.2s; cursor: pointer;
        }
        .select-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(201,119,58,0.12); }
        .select-input:disabled { opacity: 0.5; }

        .load-row { display: flex; gap: 10px; }

        /* ---- LOADING SPINNER ---- */
        .loading-wrap {
            display: none; flex-direction: column; align-items: center;
            gap: 12px; margin-top: 28px;
        }
        .loading-wrap.show { display: flex; }
        .spinner {
            width: 32px; height: 32px; border: 3px solid var(--border);
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-msg { font-size: 0.85rem; color: var(--muted); font-weight: 500; text-align: center; }

            background: var(--white); border-bottom: 1px solid var(--
